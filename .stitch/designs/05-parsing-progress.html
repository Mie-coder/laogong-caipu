<!-- Ambient Background -->

<!-- Main Container -->

<h1 class="font-section-title text-section-title text-on-background flex items-center gap-2">
<span class="material-symbols-outlined text-[24px] text-tangerine animate-spin" style="animation-duration: 3s;">hourglass_empty</span>
                正在解析
            </h1>
<p class="font-metadata text-metadata text-warm-gray mt-1">预计还需要几秒钟...</p>
</header>
<!-- Content Area -->
<main class="flex-grow flex flex-col px-gutter">

<div class="bg-surface/80 backdrop-blur-xl rounded-xl p-5 shadow-[0_4px_24px_rgba(35,26,20,0.04)] border border-white mb-10 flex gap-4 items-start">
<div class="w-10 h-10 rounded-full bg-tangerine-pale flex items-center justify-center shrink-0">

</div>
<div class="flex-grow">
<p class="font-metadata text-metadata text-warm-gray mb-0.5">来源：剪贴板内容</p>
<p class="font-body text-body text-on-surface-variant line-clamp-2">【小红书】超好吃得秘制红烧肉做法，肥而不腻，入口即化，新手一看就会的零失败教程...</p>
</div>

<div class="flex gap-6 relative">
<!-- Connecting Line -->
<div class="absolute left-[11px] top-6 bottom-[-16px] w-[2px] bg-tangerine/30 rounded-full"></div>
<!-- Indicator -->

<div class="w-6 h-6 rounded-full bg-tangerine text-white flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>

<div class="pb-10">

</div>
</div>

<div class="flex gap-6 relative">
<!-- Connecting Line -->
<div class="absolute left-[11px] top-6 bottom-[-16px] w-[2px] bg-divider rounded-full"></div>
